---
- name: Add 1Password repository key
  ansible.builtin.rpm_key:
    state: present
    key: https://downloads.1password.com/linux/keys/1password.asc

- name: Add 1Password repository
  ansible.builtin.yum_repository:
    name: 1password
    description: 1Password Stable Channel
    baseurl: https://downloads.1password.com/linux/rpm/stable/
    enabled: true
    gpgcheck: true
    gpgkey: https://downloads.1password.com/linux/keys/1password.asc

- name: Install 1Password and CLI
  ansible.builtin.dnf:
    name:
      - 1password
      - 1password-cli
    state: present

- name: Set ptrace_scope for 1Password
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-1password-ptrace.conf
    content: "kernel.yama.ptrace_scope = 1\n"
    owner: root
    group: root
    mode: '0644'

- name: Reload sysctl to apply ptrace_scope change
  ansible.builtin.command: sysctl --system
  become: true
  changed_when: false

- name: Copy 1Password GNOME shortcut script
  ansible.builtin.copy:
    src: files/1password-gnome-shortcut.sh
    dest: /tmp/1password-gnome-shortcut.sh
    mode: '0755'

- name: Run 1Password GNOME shortcut script
  ansible.builtin.command: bash /tmp/1password-gnome-shortcut.sh
  register: desktop_shortcut_result
  changed_when: "'CHANGED' in desktop_shortcut_result.stdout"
